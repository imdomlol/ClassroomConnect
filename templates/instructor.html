<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClassroomConnect Instructor View</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="background-grid" aria-hidden="true"></div>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">Instructor Controls</p>
        <h1>Prompt Manager</h1>
        <p class="subtitle">Create multiple choice or free response prompts for connected students.</p>
        <p class="subtitle"><a href="/">Back to Student View</a></p>
      </header>

      <section class="panel form-panel" aria-labelledby="new-prompt-title">
        <h2 id="new-prompt-title">Create Prompt</h2>
        <form id="prompt-form" novalidate>
          <label for="question-type">Question type</label>
          <select id="question-type" name="questionType">
            <option value="multiple_choice">Multiple choice</option>
            <option value="free_response">Free response</option>
          </select>

          <label for="prompt-text">Prompt</label>
          <textarea
            id="prompt-text"
            name="prompt"
            maxlength="280"
            rows="3"
            required
            placeholder="What topic do you want to review first?"
          ></textarea>

          <div id="options-group">
            <label for="prompt-options">Options (one per line)</label>
            <textarea
              id="prompt-options"
              name="options"
              rows="4"
              placeholder="Fractions&#10;Decimals&#10;Ratios"
            ></textarea>
          </div>

          <div class="form-row">
            <button id="prompt-submit-button" type="submit">Publish Prompt</button>
            <button id="prompt-lock-button" type="button">Lock Responses</button>
            <button id="prompt-close-button" type="button" class="ghost">Close Active Prompt</button>
            <p id="prompt-status" class="status" aria-live="polite"></p>
          </div>
        </form>
      </section>

      <section class="panel feed-panel" aria-labelledby="active-prompt-title">
        <div class="feed-header">
          <h2 id="active-prompt-title">Active Prompt Snapshot</h2>
          <p id="last-updated" class="muted">Waiting for first update...</p>
        </div>

        <p id="active-prompt-text" class="question-text">No prompt is active.</p>
        <div id="active-prompt-results" class="prompt-results" hidden></div>
      </section>

      <section class="panel feed-panel" aria-labelledby="lesson-studio-title">
        <div class="feed-header">
          <h2 id="lesson-studio-title">Lesson Studio</h2>
          <p id="lesson-sync-status" class="muted">No active lesson.</p>
        </div>

        <form id="lesson-custom-form" novalidate>
          <label for="lesson-title-input">Lesson title</label>
          <input id="lesson-title-input" maxlength="120" placeholder="Algebra Review" required />

          <label class="inline-check" for="lesson-custom-mode-append">
            <input id="lesson-custom-mode-append" type="checkbox" checked />
            <span>Add to existing lesson timeline (uncheck to replace all slides)</span>
          </label>

          <label for="lesson-slides-input">Text slides (separate each slide with ---)</label>
          <textarea
            id="lesson-slides-input"
            rows="8"
            placeholder="Slide 1 title&#10;Slide 1 body line&#10;---&#10;Slide 2 title&#10;Slide 2 body"
          ></textarea>

          <div class="form-row">
            <button id="lesson-publish-custom" type="submit">Publish / Add Text Slides</button>
            <p id="lesson-status" class="status" aria-live="polite"></p>
          </div>
        </form>

        <form id="lesson-upload-form" class="lesson-upload-form" novalidate>
          <label for="lesson-image-title">Image lesson title</label>
          <input id="lesson-image-title" maxlength="120" placeholder="Biology Diagram Set" required />

          <label class="inline-check" for="lesson-image-mode-append">
            <input id="lesson-image-mode-append" type="checkbox" checked />
            <span>Add uploaded images to existing timeline (uncheck to replace all slides)</span>
          </label>

          <label for="lesson-image-files">Upload image slides</label>
          <input id="lesson-image-files" type="file" accept="image/png,image/jpeg,image/webp,image/gif" multiple required />

          <div class="form-row">
            <button id="lesson-upload-button" type="submit">Upload / Add Image Slides</button>
          </div>
        </form>

        <div class="lesson-nav">
          <button id="lesson-prev" type="button" class="ghost">Previous Slide</button>
          <button id="lesson-next" type="button" class="ghost">Next Slide</button>
          <button id="lesson-clear" type="button" class="ghost">Clear Lesson</button>
        </div>

        <div id="lesson-preview" class="prompt-results" hidden></div>
        <div id="lesson-timeline" class="lesson-timeline" hidden></div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='instructor.js') }}" defer></script>
  </body>
</html>
